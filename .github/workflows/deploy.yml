name: 🚀 Auto-Deploy Lotus365

# Temporarily disabled - configure secrets first
# on:
#   push:
#     branches: [ main ]

# Uncomment the above 'on:' section after adding GitHub secrets:
# VPS_HOST, VPS_USERNAME, VPS_SSH_KEY, VPS_PORT

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || 22 }}
        script: |
          echo "🚀 Starting auto-deployment..."
          
          # Navigate to project directory
          cd /opt/lotus365
          
          # Pull latest code
          echo "📥 Pulling latest code..."
          git pull origin main
          
          # Stop existing containers
          echo "🛑 Stopping containers..."
          docker-compose down
          
          # Build and start new containers
          echo "🔨 Building and starting containers..."
          docker-compose up -d --build
          
          # Wait for services to start
          echo "⏳ Waiting for services..."
          sleep 30
          
          # Health checks
          echo "🔍 Running health checks..."
          
          # Check backend
          if curl -f -s http://localhost:3002/v1/health > /dev/null; then
            echo "✅ Backend is healthy"
          else
            echo "❌ Backend health check failed"
            exit 1
          fi
          
          # Check frontend
          if curl -f -s http://localhost:3003 > /dev/null; then
            echo "✅ Frontend is healthy"
          else
            echo "❌ Frontend health check failed"
            exit 1
          fi
          
          # Clean up old images
          echo "🧹 Cleaning up old Docker images..."
          docker image prune -f
          
          echo "🎉 Deployment completed successfully!"
          echo "🌐 Backend: http://91.184.244.196:3002"
          echo "🖥️ Admin Panel: http://91.184.244.196:3003"